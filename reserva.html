		<div align="center">
		<h1 >Reserva de entradas</h1>
		<hr width="100%">
		<form id="1" action="reservas.php" method="post">
			<fieldset>
				<legend>Datos visitante:</legend>
						<label for "nombre">Nombre:</label>
							<input  type="text" id="#nombre" name="nombre" maxlength="20" size="30" placeholder="nombre" autofocus><br/>
						<label for "apellido1">Apellido1:</label>
							<input  type="text" id="#apellido1" name="apellido1" maxlength="20" size="30" placeholder="primer apellido"><br/>
						<label for "apellido2">Apellido2:</label>
							<input  type="text" id="#apellido2" name="apellido2" maxlength="20" size="30" placeholder="segundo apellido"><br/>
						<label for "dni">D.N.I.:</label>
							<input  type="text" id="#dni" name="dni" maxlength="10" size="30" placeholder="nº DNI"><br/>
						<label for "correo">Correo:</label>
							<input  type="email" id="#correo" name="correo" size="30" placeholder="correo electrónico">
			</fieldset>
			<fieldset>
				<legend>Reserva:</legend>
						<label for "fecha">Fecha:</label>
							<input  type="date" id="#fecha" name="fecha"><br/>
						<label for "hora">Hora:</label>
							<input  type="time" id="#hora" name="hora"><br/>
						<label for "visitantes">Visitantes:</label>
							<input  type="number" id="#visitantes" name="visitantes" value="1" min="1" max="5">
			</fieldset>
			<fieldset>
				<legend>D.N.I. (pdf, jpge o png):</legend>
						<input type="file" id="#dni-img" name="dni-img">
			</fieldset>
			<fieldset>
				<legend>Finalizar reserva</legend>
					<input class="botones" class="textobot" type="submit" id="#enviar" name="enviar">
					<input class="botones" class="textobot" type="reset" id="#restablecer" name="restablecer">
			</fieldset>
		</form>
